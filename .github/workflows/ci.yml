name: Scala CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  build:

    runs-on: ubuntu-latest
    strategy:
      matrix:
        java: [ 11, 17 ]
        flink-version: [ "1.20.3","2.1.1","2.2.0" ]
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          java-version: ${{ matrix.java }}
          distribution: temurin
          cache: sbt
      - name: Set up sbt
        uses: coursier/setup-action@v1
        with:
          apps: sbt
          jvm: temurin:${{ matrix.java }}
      - name: Run tests
        run: sbt -DflinkVersion=${{ matrix.flink-version }} test
